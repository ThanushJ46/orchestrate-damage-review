gemini:
  api_key_env_var: "GEMINI_API_KEY"
  model_name: "gemini-2.5-flash-lite"
  fallback_model: "gemini-3.5-flash"
  temperature: 0.1
  max_retries: 3
  timeout_seconds: 30

rules:
  confidence_threshold: 0.65
  min_required_images: 1

logging:
  level: "INFO"
  log_to_file: true
  log_file_path: "outputs/logs/pipeline.log"
